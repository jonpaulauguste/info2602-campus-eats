{% extends "base.html" %}

{% block title %}Campus Eats - Sign Up{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Create Account</h2>
    <a href="/login">Already have an account? Log in</a>
</div>

<div class="restaurant-card" style="max-width: 480px; padding: 18px; margin: 0 auto;">
    <form method="post" action="/signup" style="display: grid; gap: 12px;">
        <label>
            Username
            <input type="text" name="username" required style="width: 100%; padding: 10px; margin-top: 4px;" />
        </label>

        <label>
            Email
            <input type="email" name="email" required style="width: 100%; padding: 10px; margin-top: 4px;" />
        </label>

        <label>
            Password
            <input type="password" name="password" required style="width: 100%; padding: 10px; margin-top: 4px;" />
        </label>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
    </form>
</div>
{% endblock %}
